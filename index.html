<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Merkdown</title>

  <!-- Marked: Markdown parser (local) -->
  <script src="node_modules/marked/marked.min.js"></script>

  <!-- Highlight.js: syntax highlighting (local) -->
  <link rel="stylesheet" href="node_modules/@highlightjs/cdn-assets/styles/github-dark.min.css" />
  <script src="node_modules/@highlightjs/cdn-assets/highlight.min.js"></script>

  <!-- Mermaid: diagram rendering (local) -->
  <script src="node_modules/mermaid/dist/mermaid.min.js"></script>

  <style>
    :root {
      --bg:          #1e1e2e;
      --surface:     #181825;
      --surface2:    #313244;
      --overlay:     #45475a;
      --text:        #cdd6f4;
      --subtext:     #a6adc8;
      --accent:      #89b4fa;
      --accent2:     #b4befe;
      --green:       #a6e3a1;
      --red:         #f38ba8;
      --yellow:      #f9e2af;
      --mauve:       #cba6f7;
      --border:      #313244;
      --sidebar-w:   260px;
      --titlebar-h:  40px;
      --font-mono:   'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
      --font-sans:   -apple-system, 'SF Pro Display', BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --font-size:   16px;
      --line-height: 1.7;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
      font-size: var(--font-size);
      overflow: hidden;
    }

    /* ── Layout ── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    #titlebar {
      height: var(--titlebar-h);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 16px 0 80px; /* 80px left for traffic lights */
      -webkit-app-region: drag;
      flex-shrink: 0;
      position: relative;
    }

    #titlebar * { -webkit-app-region: no-drag; }

    #file-name {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      max-width: 38%;
      font-size: 13px;
      color: var(--subtext);
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      pointer-events: none;
    }

    #titlebar-actions {
      display: flex;
      gap: 6px;
      align-items: center;
      margin-left: auto;
    }

    .tb-btn {
      background: var(--surface2);
      border: none;
      color: var(--subtext);
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .tb-btn:hover { background: var(--overlay); color: var(--text); }
    .tb-btn.active { background: var(--accent); color: var(--bg); }

    #auto-reload-indicator {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--green);
      display: none;
    }
    #auto-reload-indicator.active { display: block; }

    /* ── Body split ── */
    #body {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Sidebar (TOC) ── */
    #sidebar {
      width: var(--sidebar-w);
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      transition: width 0.25s ease, opacity 0.25s ease;
      overflow: hidden;
    }
    #sidebar.hidden { width: 0; opacity: 0; }

    /* ── Sidebar tabs ── */
    #sidebar-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .sidebar-tab {
      flex: 1;
      padding: 9px 0;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--overlay);
      background: none;
      border: none;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: color 0.15s, border-color 0.15s;
      margin-bottom: -1px;
    }
    .sidebar-tab:hover { color: var(--subtext); }
    .sidebar-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* ── Sidebar panels ── */
    .sidebar-panel {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
      display: none;
    }
    .sidebar-panel.active { display: block; }
    .sidebar-panel::-webkit-scrollbar { width: 4px; }
    .sidebar-panel::-webkit-scrollbar-track { background: transparent; }
    .sidebar-panel::-webkit-scrollbar-thumb { background: var(--overlay); border-radius: 2px; }

    /* ── Recent panel ── */
    .recent-section-header {
      padding: 10px 16px 4px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--overlay);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .recent-section-header span {
      font-size: 10px;
      background: var(--surface2);
      color: var(--subtext);
      padding: 1px 6px;
      border-radius: 10px;
      font-weight: 600;
      letter-spacing: 0;
      text-transform: none;
    }
    .recent-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 6px 14px;
      cursor: pointer;
      border-left: 2px solid transparent;
      transition: background 0.1s, border-color 0.1s;
      overflow: hidden;
    }
    .recent-item:hover { background: var(--surface2); }
    .recent-item.active {
      border-left-color: var(--accent);
      background: rgba(137,180,250,0.06);
    }
    .recent-item-icon { flex-shrink: 0; margin-top: 2px; opacity: 0.6; }
    .recent-item-info { overflow: hidden; flex: 1; }
    .recent-item-name {
      font-size: 13px;
      color: var(--subtext);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      display: block;
    }
    .recent-item:hover .recent-item-name,
    .recent-item.active .recent-item-name { color: var(--text); }
    .recent-item.active .recent-item-name { color: var(--accent); }
    .recent-item-dir {
      font-size: 11px;
      color: var(--overlay);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      display: block;
      margin-top: 1px;
    }
    .recent-empty {
      padding: 12px 16px;
      font-size: 12px;
      color: var(--overlay);
    }
    .recent-divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 6px 0;
    }

    /* ── TOC items ── */
    .toc-item {
      display: block;
      padding: 5px 16px;
      font-size: 13px;
      color: var(--subtext);
      cursor: pointer;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      border-left: 2px solid transparent;
      transition: color 0.1s, border-color 0.1s, background 0.1s;
      text-decoration: none;
    }
    .toc-item:hover { color: var(--text); background: var(--surface2); }
    .toc-item.active { color: var(--accent); border-left-color: var(--accent); }
    .toc-item[data-level="2"] { padding-left: 28px; }
    .toc-item[data-level="3"] { padding-left: 40px; font-size: 12px; }
    .toc-item[data-level="4"] { padding-left: 52px; font-size: 12px; }

    /* ── File browser ── */
    #dir-name {
      padding: 10px 16px 4px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--overlay);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .file-item {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 5px 14px;
      font-size: 13px;
      color: var(--subtext);
      cursor: pointer;
      border-left: 2px solid transparent;
      transition: color 0.1s, background 0.1s, border-color 0.1s;
      overflow: hidden;
    }
    .file-item:hover { color: var(--text); background: var(--surface2); }
    .file-item.active {
      color: var(--accent);
      border-left-color: var(--accent);
      background: rgba(137,180,250,0.06);
    }
    .file-item-icon { flex-shrink: 0; opacity: 0.6; }
    .file-item-name {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }
    .file-item-ext {
      font-size: 10px;
      color: var(--overlay);
      flex-shrink: 0;
    }

    /* ── Main content ── */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    #content-area {
      flex: 1;
      overflow-y: auto;
      padding: 48px 56px;
      scroll-behavior: smooth;
    }
    /* Pure diagram file: fill the entire right pane */
    #content-area.diagram-mode {
      padding: 0;
      overflow: hidden;
      position: relative;   /* anchor for absolute children */
    }
    #content-area.diagram-mode #rendered {
      position: absolute;
      inset: 0;             /* top/right/bottom/left: 0 */
      max-width: none;
      margin: 0;
    }
    #content-area.diagram-mode .mermaid-wrapper {
      position: absolute;
      inset: 0;
      margin: 0;
      border-radius: 0;
      border: none;
    }
    #content-area::-webkit-scrollbar { width: 6px; }
    #content-area::-webkit-scrollbar-track { background: transparent; }
    #content-area::-webkit-scrollbar-thumb { background: var(--overlay); border-radius: 3px; }

    /* ── Source view ── */
    #source-area {
      display: none;
      flex: 1;
      overflow: hidden;
    }
    #source-area.visible { display: flex; }
    #source-pre {
      flex: 1;
      overflow: auto;
      padding: 32px 40px;
      margin: 0;
      font-family: var(--font-mono);
      font-size: 13px;
      line-height: 1.6;
      color: var(--text);
      background: transparent;
      white-space: pre-wrap;
      word-break: break-word;
    }

    /* ── Editor area (full-width, swaps with content-area in edit mode) ── */
    #editor-area {
      display: none;
      flex: 1;
      flex-direction: column;
      overflow: hidden;
    }
    #main.edit-mode #editor-area   { display: flex; }
    #main.edit-mode #content-area  { display: none; }
    #main.edit-mode #source-area   { display: none !important; }

    #editor-toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      font-size: 12px;
      color: var(--subtext);
    }
    #editor-modified {
      color: var(--yellow);
      font-size: 11px;
      display: none;
    }
    #editor-modified.visible { display: inline; }
    #editor-char-count { margin-left: auto; color: var(--overlay); font-size: 11px; font-family: var(--font-mono); }

    #editor-textarea {
      flex: 1;
      width: 100%;
      background: var(--bg);
      color: var(--text);
      border: none;
      outline: none;
      resize: none;
      padding: 32px 56px;
      font-family: var(--font-mono);
      font-size: 13px;
      line-height: 1.7;
      overflow-y: auto;
      tab-size: 2;
    }
    #editor-textarea::selection { background: rgba(137,180,250,0.25); }
    #editor-textarea::-webkit-scrollbar { width: 6px; }
    #editor-textarea::-webkit-scrollbar-thumb { background: var(--overlay); border-radius: 3px; }

    /* Save/Save-As hidden until edit mode is on (toggled via JS) */
    #btn-save, #btn-save-as { display: none; }

    /* ── Drop zone ── */
    #drop-zone {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      color: var(--subtext);
    }
    #drop-zone.drag-over { background: rgba(137, 180, 250, 0.05); }
    #drop-zone svg { opacity: 0.3; }
    #drop-zone h2 { font-size: 20px; font-weight: 500; color: var(--subtext); }
    #drop-zone p { font-size: 14px; color: var(--overlay); }
    #open-btn, #open-folder-btn {
      background: var(--accent);
      color: var(--bg);
      border: none;
      padding: 10px 24px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    #open-folder-btn {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
    }
    #open-btn:hover { opacity: 0.85; }

    /* ── Search bar ── */
    #search-bar {
      display: none;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 8px 16px;
      align-items: center;
      gap: 8px;
    }
    #search-bar.visible { display: flex; }
    #search-input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 13px;
      outline: none;
    }
    #search-input:focus { border-color: var(--accent); }
    #search-count { font-size: 12px; color: var(--subtext); min-width: 60px; }
    .search-btn {
      background: var(--surface2);
      border: none;
      color: var(--subtext);
      padding: 5px 10px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
    }
    .search-btn:hover { background: var(--overlay); color: var(--text); }

    /* ── Status bar ── */
    #statusbar {
      height: 24px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 16px;
      font-size: 11px;
      color: var(--overlay);
      flex-shrink: 0;
    }
    #statusbar span { display: flex; align-items: center; gap: 4px; }

    /* ── Markdown styles ── */
    #rendered {
      max-width: 820px;
      margin: 0 auto;
    }

    #rendered h1, #rendered h2, #rendered h3,
    #rendered h4, #rendered h5, #rendered h6 {
      color: var(--text);
      font-weight: 600;
      line-height: 1.3;
      margin: 1.8em 0 0.6em;
      scroll-margin-top: 80px;
    }
    #rendered h1 { font-size: 2em; border-bottom: 1px solid var(--border); padding-bottom: 0.3em; }
    #rendered h2 { font-size: 1.5em; border-bottom: 1px solid var(--border); padding-bottom: 0.2em; }
    #rendered h3 { font-size: 1.25em; }
    #rendered h4 { font-size: 1.1em; }
    #rendered h1:first-child { margin-top: 0; }

    #rendered p { margin: 0.9em 0; line-height: var(--line-height); }

    #rendered a { color: var(--accent); text-decoration: none; }
    #rendered a:hover { text-decoration: underline; }

    #rendered ul, #rendered ol {
      margin: 0.6em 0;
      padding-left: 1.8em;
    }
    #rendered li { margin: 0.3em 0; line-height: var(--line-height); }
    #rendered li > ul, #rendered li > ol { margin: 0.2em 0; }

    #rendered blockquote {
      border-left: 3px solid var(--accent);
      margin: 1em 0;
      padding: 0.5em 1em;
      background: rgba(137, 180, 250, 0.06);
      border-radius: 0 6px 6px 0;
      color: var(--subtext);
    }

    #rendered code {
      font-family: var(--font-mono);
      font-size: 0.875em;
      background: var(--surface2);
      padding: 0.2em 0.4em;
      border-radius: 4px;
      color: var(--mauve);
    }

    #rendered pre {
      background: var(--surface) !important;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1em 1.2em;
      overflow-x: auto;
      margin: 1em 0;
      position: relative;
    }
    #rendered pre code {
      background: none;
      padding: 0;
      color: var(--text);
      font-size: 13px;
    }

    /* Copy button on code blocks */
    .code-copy-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      background: var(--surface2);
      border: none;
      color: var(--subtext);
      padding: 3px 8px;
      border-radius: 4px;
      font-size: 11px;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.15s;
    }
    #rendered pre:hover .code-copy-btn { opacity: 1; }
    .code-copy-btn:hover { background: var(--overlay); color: var(--text); }
    .code-copy-btn.copied { color: var(--green); }

    #rendered table {
      border-collapse: collapse;
      width: 100%;
      margin: 1em 0;
      font-size: 14px;
    }
    #rendered th, #rendered td {
      border: 1px solid var(--border);
      padding: 8px 12px;
      text-align: left;
    }
    #rendered th {
      background: var(--surface);
      color: var(--subtext);
      font-weight: 600;
      font-size: 13px;
    }
    #rendered tr:nth-child(even) td { background: rgba(49, 50, 68, 0.3); }

    #rendered img {
      max-width: 100%;
      border-radius: 8px;
      margin: 0.5em 0;
    }

    #rendered hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 2em 0;
    }

    /* Task list checkboxes */
    #rendered input[type="checkbox"] {
      accent-color: var(--accent);
      margin-right: 6px;
    }

    /* ── Mermaid diagrams ── */
    .mermaid-wrapper {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      margin: 1.2em 0;
      overflow: hidden;        /* viewport — diagram pans inside this */
      position: relative;
      cursor: grab;
      user-select: none;
      /* height set dynamically by JS to match diagram's natural aspect ratio */
    }
    .mermaid-wrapper:active { cursor: grabbing; }
    .mermaid-inner {
      width: 100%;
      height: 100%;
    }
    /* SVG fills the viewport; viewBox drives zoom — no pixel scaling, always crisp */
    .mermaid-wrapper svg {
      display: block;
      width: 100%;
      height: 100%;
    }
    .diagram-controls {
      position: absolute;
      bottom: 10px;
      right: 10px;
      display: flex;
      gap: 4px;
      opacity: 0;
      transition: opacity 0.2s;
      z-index: 10;
    }
    .mermaid-wrapper:hover .diagram-controls { opacity: 1; }
    .diagram-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--subtext);
      width: 28px; height: 28px;
      border-radius: 5px;
      font-size: 15px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.1s, color 0.1s;
      line-height: 1;
    }
    .diagram-btn:hover { background: var(--overlay); color: var(--text); }
    .diagram-scale-label {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--subtext);
      padding: 0 8px;
      height: 28px;
      border-radius: 5px;
      font-size: 11px;
      display: flex; align-items: center;
      font-family: var(--font-mono);
      min-width: 44px;
      justify-content: center;
    }

    /* ── Flash on reload ── */
    @keyframes flash {
      0%   { background: rgba(137, 180, 250, 0.12); }
      100% { background: transparent; }
    }
    .flash { animation: flash 0.5s ease; }

    /* ── Search highlights ── */
    mark.search-highlight {
      background: rgba(249, 226, 175, 0.4);
      color: var(--yellow);
      border-radius: 2px;
      padding: 0 1px;
    }
    mark.search-highlight.current {
      background: rgba(249, 226, 175, 0.7);
      color: var(--bg);
    }

    /* ── Scrollbar global ── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--overlay); border-radius: 3px; }
  </style>
</head>
<body>
<div id="app">

  <!-- Title bar -->
  <div id="titlebar">
    <span id="file-name">No file open</span>
    <div id="titlebar-actions">
      <span id="auto-reload-indicator" title="Auto-reload active"></span>
      <button class="tb-btn" id="btn-open" title="Open file (⌘O)">
        <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>
        Open
      </button>
      <button class="tb-btn" id="btn-save" title="Save (⌘S)">
        <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
        Save
      </button>
      <button class="tb-btn" id="btn-save-as" title="Save As (⌘⇧S)">
        <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/><line x1="12" y1="3" x2="12" y2="8"/></svg>
        Save As
      </button>
      <button class="tb-btn" id="btn-edit" title="Toggle editor (⌘E)">
        <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        Edit
      </button>
      <button class="tb-btn" id="btn-source" title="Toggle source (⌘U)">
        <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
        Source
      </button>
      <button class="tb-btn" id="btn-sidebar" title="Toggle sidebar (⌘\\)">

<script>
// ─── Library guard ─────────────────────────────────────────────────────────
(function() {
  const missing = [];
  if (typeof marked   === 'undefined') missing.push('marked');
  if (typeof hljs     === 'undefined') missing.push('highlight.js');
  if (typeof mermaid  === 'undefined') missing.push('mermaid');
  if (missing.length) {
    document.body.innerHTML = `
      <div style="padding:48px;font-family:monospace;color:#f38ba8;background:#1e1e2e;height:100vh">
        <h2 style="margin-bottom:16px">Script load error</h2>
        <p>Failed to load: <b>${missing.join(', ')}</b></p>
        <p style="margin-top:12px;color:#a6adc8;font-size:13px">
          Check that node_modules exists: run <code>npm install</code> in the app folder.
        </p>
      </div>`;
    throw new Error('Required libraries not loaded: ' + missing.join(', '));
  }
})();

// ─── Mermaid init ───────────────────────────────────────────────────────────
mermaid.initialize({
  startOnLoad: false,
  theme: 'dark',
  themeVariables: {
    primaryColor: '#89b4fa',
    primaryTextColor: '#cdd6f4',
    primaryBorderColor: '#313244',
    lineColor: '#a6adc8',
    secondaryColor: '#313244',
    tertiaryColor: '#181825',
    background: '#1e1e2e',
    mainBkg: '#181825',
    nodeBorder: '#45475a',
    clusterBkg: '#181825',
    titleColor: '#cdd6f4',
    edgeLabelBackground: '#313244',
  },
  flowchart: { htmlLabels: true, curve: 'basis' },
  securityLevel: 'loose',
});

// ─── Marked config ──────────────────────────────────────────────────────────
const renderer = new marked.Renderer();
let mermaidCounter = 0;

// Custom code block renderer – intercept ```mermaid blocks
renderer.code = function({ text, lang }) {
  if (lang === 'mermaid') {
    const id = `mermaid-${++mermaidCounter}`;
    return `<div class="mermaid-wrapper"><div class="mermaid-inner"><div class="mermaid" id="${id}">${escapeHtml(text)}</div></div></div>`;
  }
  const highlighted = lang && hljs.getLanguage(lang)
    ? hljs.highlight(text, { language: lang }).value
    : hljs.highlightAuto(text).value;
  return `<pre><code class="hljs language-${lang || 'plaintext'}">${highlighted}</code><button class="code-copy-btn" onclick="copyCode(this)">Copy</button></pre>`;
};

marked.use({ renderer, gfm: true, breaks: false });

// Detect pure mermaid files (.mmd / .mermaid) and wrap in a fenced block
// so they render as a diagram instead of raw text.
function wrapIfPureMermaid(content, fileName) {
  if (fileName && (fileName.endsWith('.mmd') || fileName.endsWith('.mermaid'))) {
    return '```mermaid\n' + content.trim() + '\n```';
  }
  return content;
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ─── State ──────────────────────────────────────────────────────────────────
let currentContent = '';  // wrapped content fed to marked/mermaid for rendering
let rawContent = '';      // raw bytes from disk — what goes in the editor and gets saved
let sidebarVisible = true;
let sourceVisible = false;
let searchMatches = [];
let searchIdx = -1;

const $ = id => document.getElementById(id);

// ─── Render ─────────────────────────────────────────────────────────────────
async function render(content, flash = false) {
  mermaidCounter = 0;
  currentContent = content;

  const rendered = $('rendered');
  const dropZone = $('drop-zone');

  dropZone.style.display = 'none';
  rendered.style.display = 'block';

  // Parse & inject HTML
  try {
    const html = marked.parse(content);
    rendered.innerHTML = (html instanceof Promise) ? await html : html;
  } catch (err) {
    console.error('[render] marked.parse failed:', err);
    rendered.innerHTML = `<pre style="color:var(--red);padding:24px">${err.message}</pre>`;
    return;
  }

  // Render mermaid diagrams
  const diagrams = rendered.querySelectorAll('.mermaid');
  for (const el of diagrams) {
    try {
      const { svg } = await mermaid.render(el.id + '_svg', el.textContent);
      el.innerHTML = svg;
    } catch (e) {
      el.innerHTML = `<div style="color:var(--red);font-size:13px;font-family:monospace;padding:8px">Mermaid error: ${escapeHtml(e.message)}</div>`;
    }
    enableDiagramZoom(el.closest('.mermaid-wrapper'));
  }

  // Source view
  $('source-pre').textContent = content;

  // Build TOC
  buildToc(rendered);

  // Stats
  const words = content.trim().split(/\s+/).filter(Boolean).length;
  const lines = content.split('\n').length;
  $('status-words').textContent = `${words.toLocaleString()} words`;
  $('status-lines').textContent = `${lines.toLocaleString()} lines`;
  $('status-diagrams').textContent = diagrams.length
    ? `${diagrams.length} diagram${diagrams.length > 1 ? 's' : ''}`
    : '';

  if (flash) {
    rendered.classList.remove('flash');
    void rendered.offsetWidth;
    rendered.classList.add('flash');
    const reloadStatus = $('status-reload');
    reloadStatus.style.display = 'flex';
    setTimeout(() => { reloadStatus.style.display = 'none'; }, 2000);
  }

  // Re-apply search if active
  if ($('search-bar').classList.contains('visible') && $('search-input').value) {
    performSearch($('search-input').value);
  }
}

// ─── TOC ────────────────────────────────────────────────────────────────────
function buildToc(container) {
  const toc = $('toc');
  toc.innerHTML = '';
  const headings = container.querySelectorAll('h1,h2,h3,h4');
  if (!headings.length) {
    toc.innerHTML = '<div style="padding:12px 16px;font-size:12px;color:var(--overlay)">No headings found</div>';
    return;
  }
  headings.forEach((h, i) => {
    const level = parseInt(h.tagName[1]);
    const id = `heading-${i}`;
    h.id = id;
    const a = document.createElement('a');
    a.className = 'toc-item';
    a.dataset.level = level;
    a.textContent = h.textContent;
    a.href = '#' + id;
    a.addEventListener('click', e => {
      e.preventDefault();
      h.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });
    toc.appendChild(a);
  });

  // Highlight active heading on scroll
  const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        toc.querySelectorAll('.toc-item').forEach(a => a.classList.remove('active'));
        const active = toc.querySelector(`[href="#${entry.target.id}"]`);
        if (active) active.classList.add('active');
      }
    });
  }, { rootMargin: '-10% 0px -85% 0px' });

  headings.forEach(h => observer.observe(h));
}

// ─── Copy code ──────────────────────────────────────────────────────────────
function copyCode(btn) {
  const code = btn.previousSibling?.textContent ?? '';
  navigator.clipboard.writeText(code).then(() => {
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 1500);
  });
}

// ─── Sidebar toggle ─────────────────────────────────────────────────────────
function toggleSidebar() {
  sidebarVisible = !sidebarVisible;
  $('sidebar').classList.toggle('hidden', !sidebarVisible);
  $('btn-sidebar').classList.toggle('active', sidebarVisible);
}

// ─── Source toggle ──────────────────────────────────────────────────────────
function toggleSource() {
  sourceVisible = !sourceVisible;
  $('source-area').classList.toggle('visible', sourceVisible);
  $('content-area').style.display = sourceVisible ? 'none' : '';
  $('btn-source').classList.toggle('active', sourceVisible);
}

// ─── Per-diagram viewBox zoom + drag-to-pan (always crisp — no pixel scaling) ──
function enableDiagramZoom(wrapper) {
  const svgEl = wrapper.querySelector('svg');
  if (!svgEl) return;

  // ── 1. Read natural diagram bounds ────────────────────────────────────────
  let origVB = svgEl.getAttribute('viewBox');
  let ovx, ovy, ovw, ovh;
  if (origVB) {
    [ovx, ovy, ovw, ovh] = origVB.trim().split(/[\s,]+/).map(Number);
  } else {
    const w = parseFloat(svgEl.getAttribute('width'))  || 800;
    const h = parseFloat(svgEl.getAttribute('height')) || 600;
    ovx = 0; ovy = 0; ovw = w; ovh = h;
    svgEl.setAttribute('viewBox', `0 0 ${w} ${h}`);
  }

  // ── 2. SVG fills wrapper; preserveAspectRatio=none so viewBox drives shape ─
  svgEl.removeAttribute('width');
  svgEl.removeAttribute('height');
  svgEl.setAttribute('preserveAspectRatio', 'none');
  svgEl.style.cssText = 'display:block;width:100%;height:100%;';

  // ── 3. Inline diagram (in markdown): size wrapper by natural aspect ratio ──
  const contentArea = document.getElementById('content-area');
  if (!contentArea?.classList.contains('diagram-mode')) {
    function sizeWrapper() {
      const availW = (contentArea?.clientWidth || 900) - 112;
      const natural = availW * (ovh / ovw);
      wrapper.style.height = Math.max(window.innerHeight * 0.30,
                              Math.min(window.innerHeight * 0.82, natural)) + 'px';
    }
    sizeWrapper();
    window.addEventListener('resize', sizeWrapper);
  }

  // ── 4. ViewBox state + saved fit dimensions ──────────────────────────────
  let vx = ovx, vy = ovy, vw = ovw, vh = ovh;
  // fitVW/fitVH are set once by fitToWrapper() and READ (never mutated) by commitVB.
  // Keeping them separate prevents commitVB from accidentally resetting the live state.
  let fitVW = ovw, fitVH = ovh;

  function fitToWrapper() {
    const wW = wrapper.clientWidth  || 900;
    const wH = wrapper.clientHeight || 600;
    if (!wW || !wH) return;
    const wAR = wW / wH;
    const dAR = ovw / ovh;
    if (wAR > dAR) {
      vw = ovh * wAR; vh = ovh;
      vx = ovx - (vw - ovw) / 2; vy = ovy;
    } else {
      vw = ovw; vh = ovw / wAR;
      vx = ovx; vy = ovy - (vh - ovh) / 2;
    }
    fitVW = vw; fitVH = vh; // snapshot — commitVB reads these, never recomputes them
  }

  function commitVB() {
    svgEl.setAttribute('viewBox', `${vx} ${vy} ${vw} ${vh}`);
    const label = wrapper.querySelector('.diagram-scale-label');
    if (label) label.textContent = Math.round((fitVW / vw) * 100) + '%';
  }

  function resetToFit() { fitToWrapper(); commitVB(); }

  // Double-RAF: let flex layout settle before reading clientWidth/Height
  requestAnimationFrame(() => requestAnimationFrame(resetToFit));
  window.addEventListener('resize', resetToFit);

  // ── 5. Scroll to zoom (anchored at cursor) ────────────────────────────────
  wrapper.addEventListener('wheel', (e) => {
    e.preventDefault();
    const rect = svgEl.getBoundingClientRect();
    const fx = (e.clientX - rect.left) / rect.width;
    const fy = (e.clientY - rect.top)  / rect.height;
    const anchorX = vx + fx * vw;
    const anchorY = vy + fy * vh;
    const factor = e.deltaY < 0 ? 1 / 1.12 : 1.12;
    // Clamp relative to fit view: 0.5% to 1500% zoom
    vw = Math.max(fitVW * 0.005, Math.min(fitVW * 8, vw * factor));
    vh = Math.max(fitVH * 0.005, Math.min(fitVH * 8, vh * factor));
    vx = anchorX - fx * vw;
    vy = anchorY - fy * vh;
    commitVB();
  }, { passive: false });

  // ── 6. Drag to pan ────────────────────────────────────────────────────────
  let dragging = false, startX, startY, startVX, startVY;
  wrapper.addEventListener('mousedown', (e) => {
    if (e.button !== 0) return;
    dragging = true;
    startX = e.clientX; startY = e.clientY;
    startVX = vx; startVY = vy;
    e.preventDefault();
  });
  window.addEventListener('mousemove', (e) => {
    if (!dragging) return;
    const rect = svgEl.getBoundingClientRect();
    vx = startVX - (e.clientX - startX) / rect.width  * vw;
    vy = startVY - (e.clientY - startY) / rect.height * vh;
    commitVB();
  });
  window.addEventListener('mouseup', () => { dragging = false; });

  // ── 7. Hover controls ────────────────────────────────────────────────────
  const controls = document.createElement('div');
  controls.className = 'diagram-controls';
  controls.innerHTML = `
    <button class="diagram-btn" title="Zoom in">+</button>
    <span class="diagram-scale-label">100%</span>
    <button class="diagram-btn" title="Zoom out">−</button>
    <button class="diagram-btn" title="Fit to window (double-click)">↺</button>
  `;
  const [btnIn, , btnOut, btnReset] = controls.children;
  function zoomCenter(factor) {
    const newVW = Math.max(fitVW * 0.005, Math.min(fitVW * 8, vw * factor));
    const newVH = Math.max(fitVH * 0.005, Math.min(fitVH * 8, vh * factor));
    vx += (vw - newVW) / 2; vy += (vh - newVH) / 2;
    vw = newVW; vh = newVH;
    commitVB();
  }
  btnIn .addEventListener('click', (e) => { e.stopPropagation(); zoomCenter(1/1.3); });
  btnOut.addEventListener('click', (e) => { e.stopPropagation(); zoomCenter(1.3); });
  btnReset.addEventListener('click', (e) => { e.stopPropagation(); resetToFit(); });
  wrapper.addEventListener('dblclick', resetToFit);
  wrapper.appendChild(controls);
}

// ─── Search ─────────────────────────────────────────────────────────────────
function showSearch() {
  $('search-bar').classList.add('visible');
  $('search-input').focus();
  $('search-input').select();
}

function hideSearch() {
  $('search-bar').classList.remove('visible');
  clearHighlights();
  $('search-count').textContent = '';
  searchMatches = [];
  searchIdx = -1;
}

function clearHighlights() {
  $('rendered').querySelectorAll('mark.search-highlight').forEach(m => {
    m.replaceWith(document.createTextNode(m.textContent));
  });
  $('rendered').normalize();
}

function performSearch(query) {
  clearHighlights();
  searchMatches = [];
  searchIdx = -1;

  if (!query.trim()) {
    $('search-count').textContent = '';
    return;
  }

  const re = new RegExp(escapeRegex(query), 'gi');
  highlightInNode($('rendered'), re);
  searchMatches = Array.from($('rendered').querySelectorAll('mark.search-highlight'));
  $('search-count').textContent = searchMatches.length
    ? `1 / ${searchMatches.length}`
    : 'No results';
  if (searchMatches.length) navigateSearch(0);
}

function escapeRegex(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }

function highlightInNode(node, re) {
  if (node.nodeType === Node.TEXT_NODE) {
    const text = node.textContent;
    if (!re.test(text)) return;
    re.lastIndex = 0;
    const frag = document.createDocumentFragment();
    let last = 0, m;
    while ((m = re.exec(text)) !== null) {
      if (m.index > last) frag.appendChild(document.createTextNode(text.slice(last, m.index)));
      const mark = document.createElement('mark');
      mark.className = 'search-highlight';
      mark.textContent = m[0];
      frag.appendChild(mark);
      last = m.index + m[0].length;
    }
    if (last < text.length) frag.appendChild(document.createTextNode(text.slice(last)));
    node.replaceWith(frag);
  } else if (node.nodeType === Node.ELEMENT_NODE && !['SCRIPT','STYLE','SVG'].includes(node.tagName)) {
    Array.from(node.childNodes).forEach(c => highlightInNode(c, re));
  }
}

function navigateSearch(idx) {
  if (!searchMatches.length) return;
  searchIdx = ((idx % searchMatches.length) + searchMatches.length) % searchMatches.length;
  searchMatches.forEach((m, i) => m.classList.toggle('current', i === searchIdx));
  searchMatches[searchIdx].scrollIntoView({ behavior: 'smooth', block: 'center' });
  $('search-count').textContent = `${searchIdx + 1} / ${searchMatches.length}`;
}

// ─── Drag & drop ────────────────────────────────────────────────────────────
const dropZone = $('drop-zone');

document.addEventListener('dragover', e => {
  e.preventDefault();
  dropZone.classList.add('drag-over');
});
document.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
document.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  const EXTS = ['.md', '.markdown', '.mmd', '.mermaid'];
  if (file && EXTS.some(ext => file.name.endsWith(ext))) {
    // Use openPath so main process handles it: watcher, history, siblings all update
    if (file.path && window.electronAPI) {
      window.electronAPI.openPath(file.path);
    }
  }
});

// ─── Sidebar tabs ────────────────────────────────────────────────────────────
let activePanel = 'files';

document.querySelectorAll('.sidebar-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    const panel = tab.dataset.panel;
    activePanel = panel;
    document.querySelectorAll('.sidebar-tab').forEach(t => t.classList.toggle('active', t.dataset.panel === panel));
    document.querySelectorAll('.sidebar-panel').forEach(p => p.classList.toggle('active', p.id === `panel-${panel}`));
  });
});

// Switch to TOC tab when a markdown file is loaded (has headings)
function autoSwitchTab(hasToc) {
  const target = hasToc ? 'toc' : 'files';
  document.querySelectorAll('.sidebar-tab').forEach(t => t.classList.toggle('active', t.dataset.panel === target));
  document.querySelectorAll('.sidebar-panel').forEach(p => p.classList.toggle('active', p.id === `panel-${target}`));
  activePanel = target;
}

// ─── Recent history ──────────────────────────────────────────────────────────
function populateRecentPanel(history) {
  const ICON_MD = `<svg class="recent-item-icon" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M13 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V9z"/><polyline points="13 2 13 9 20 9"/></svg>`;
  const ICON_MMD = `<svg class="recent-item-icon" width="13" height="13" fill="none" stroke="var(--mauve)" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="5" r="2"/><circle cx="5" cy="19" r="2"/><circle cx="19" cy="19" r="2"/><line x1="12" y1="7" x2="5" y2="17"/><line x1="12" y1="7" x2="19" y2="17"/></svg>`;

  function buildList(containerId, countId, items, icon) {
    const list = $(containerId);
    const countEl = $(countId);
    countEl.textContent = items.length;
    if (!items.length) {
      list.innerHTML = '<div class="recent-empty">No recent files</div>';
      return;
    }
    list.innerHTML = '';
    items.forEach(filePath => {
      const name = filePath.split('/').pop();
      const dir  = filePath.split('/').slice(0, -1).join('/');
      const item = document.createElement('div');
      item.className = 'recent-item';
      if (filePath === currentFilePath) item.classList.add('active');
      item.dataset.path = filePath;
      item.innerHTML = `
        ${icon}
        <div class="recent-item-info">
          <span class="recent-item-name">${name}</span>
          <span class="recent-item-dir">${dir}</span>
        </div>`;
      item.addEventListener('click', () => window.electronAPI?.openPath(filePath));
      list.appendChild(item);
    });
  }

  buildList('recent-md-list',      'recent-md-count',      history.md      || [], ICON_MD);
  buildList('recent-mermaid-list', 'recent-mermaid-count', history.mermaid || [], ICON_MMD);

  // Keep active state in sync
  document.querySelectorAll('#panel-recent .recent-item').forEach(el => {
    el.classList.toggle('active', el.dataset.path === currentFilePath);
  });
}

// ─── File browser ─────────────────────────────────────────────────────────────
let currentFilePath = null;

function populateFileList(dirName, siblings) {
  $('dir-name').textContent = dirName || 'Files';
  const list = $('file-list');
  list.innerHTML = '';

  if (!siblings?.length) {
    list.innerHTML = '<div style="padding:12px 16px;font-size:12px;color:var(--overlay)">No files found</div>';
    return;
  }

  const ICONS = {
    md:       `<svg class="file-item-icon" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M13 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V9z"/><polyline points="13 2 13 9 20 9"/></svg>`,
    markdown: `<svg class="file-item-icon" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M13 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V9z"/><polyline points="13 2 13 9 20 9"/></svg>`,
    mmd:      `<svg class="file-item-icon" width="13" height="13" fill="none" stroke="var(--mauve)" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="5" r="2"/><circle cx="5" cy="19" r="2"/><circle cx="19" cy="19" r="2"/><line x1="12" y1="7" x2="5" y2="17"/><line x1="12" y1="7" x2="19" y2="17"/></svg>`,
    mermaid:  `<svg class="file-item-icon" width="13" height="13" fill="none" stroke="var(--mauve)" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="5" r="2"/><circle cx="5" cy="19" r="2"/><circle cx="19" cy="19" r="2"/><line x1="12" y1="7" x2="5" y2="17"/><line x1="12" y1="7" x2="19" y2="17"/></svg>`,
  };

  siblings.forEach(({ name, filePath }) => {
    const ext = name.split('.').pop().toLowerCase();
    const item = document.createElement('div');
    item.className = 'file-item';
    if (filePath === currentFilePath) item.classList.add('active');
    item.dataset.path = filePath;
    item.innerHTML = `
      ${ICONS[ext] || ICONS.md}
      <span class="file-item-name">${name}</span>
      <span class="file-item-ext">.${ext}</span>
    `;
    item.addEventListener('click', () => {
      window.electronAPI?.openPath(filePath);
    });
    list.appendChild(item);
  });
}

function setActiveFile(filePath) {
  currentFilePath = filePath;
  document.querySelectorAll('.file-item, .recent-item').forEach(el => {
    el.classList.toggle('active', el.dataset.path === filePath);
  });
}

// ─── Editor ─────────────────────────────────────────────────────────────────
let editMode = false;
let editorModified = false;

function setEditMode(on) {
  editMode = on;
  $('main').classList.toggle('edit-mode', on);
  $('btn-edit').classList.toggle('active', on);
  $('btn-save').style.display    = on ? 'flex' : 'none';
  $('btn-save-as').style.display = on ? 'flex' : 'none';

  if (on) {
    // Load raw file content — never the wrapped version
    $('editor-textarea').value = rawContent;
    setEditorModified(false);
    updateCharCount();
    $('editor-textarea').focus();
  } else {
    // Re-render from raw edited content (wrapIfPureMermaid handles .mmd/.mermaid)
    const fileName = $('file-name').textContent || '';
    render(wrapIfPureMermaid(rawContent, fileName));
  }
}

function setEditorModified(val) {
  editorModified = val;
  $('editor-modified').classList.toggle('visible', val);
}

function updateCharCount() {
  const len = $('editor-textarea').value.length;
  $('editor-char-count').textContent = len.toLocaleString() + ' chars';
}

// Track changes — sync rawContent so Save writes the correct bytes
$('editor-textarea').addEventListener('input', () => {
  setEditorModified(true);
  updateCharCount();
  rawContent = $('editor-textarea').value;
});

// Tab key → insert 2 spaces instead of leaving the textarea
$('editor-textarea').addEventListener('keydown', e => {
  if (e.key === 'Tab') {
    e.preventDefault();
    const ta = $('editor-textarea');
    const start = ta.selectionStart;
    const end   = ta.selectionEnd;
    ta.value = ta.value.slice(0, start) + '  ' + ta.value.slice(end);
    ta.selectionStart = ta.selectionEnd = start + 2;
    setEditorModified(true);
  }
});

async function saveFile() {
  if (!currentFilePath) return saveFileAs();
  const content = $('editor-textarea').value;
  const res = await window.electronAPI?.saveFile(currentFilePath, content);
  if (res?.success) {
    setEditorModified(false);
    // Brief "Saved" flash in titlebar
    const orig = $('file-name').textContent;
    $('file-name').textContent = '✓ Saved — ' + orig;
    setTimeout(() => { $('file-name').textContent = orig; }, 1500);
  } else if (res?.error) {
    alert('Save failed: ' + res.error);
  }
}

async function saveFileAs() {
  const content = $('editor-textarea').value || rawContent;
  const defaultName = ($('file-name').textContent || 'untitled.md').replace(/^✓.*?— /, '');
  const res = await window.electronAPI?.saveFileAs(content, defaultName);
  if (res?.success) {
    setEditorModified(false);
  }
}

function toggleEditMode() { setEditMode(!editMode); }

// ─── Button wiring ──────────────────────────────────────────────────────────
$('btn-open').addEventListener('click', () => window.electronAPI?.openFileDialog());
$('open-btn').addEventListener('click', () => window.electronAPI?.openFileDialog());
$('open-folder-btn').addEventListener('click', async () => {
  const result = await window.electronAPI?.openFolderDialog();
  if (result) populateFileList(result.dirName, result.siblings);
});
$('btn-sidebar').addEventListener('click', toggleSidebar);
$('btn-source').addEventListener('click', toggleSource);
$('btn-edit').addEventListener('click', toggleEditMode);
$('btn-save').addEventListener('click', saveFile);
$('btn-save-as').addEventListener('click', saveFileAs);
$('search-input').addEventListener('input', e => performSearch(e.target.value));
$('search-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') navigateSearch(searchIdx + (e.shiftKey ? -1 : 1));
  if (e.key === 'Escape') hideSearch();
});
$('search-prev').addEventListener('click', () => navigateSearch(searchIdx - 1));
$('search-next').addEventListener('click', () => navigateSearch(searchIdx + 1));
$('search-close').addEventListener('click', hideSearch);

// ─── Electron IPC ───────────────────────────────────────────────────────────
if (window.electronAPI) {
  window.electronAPI.onFileLoaded(({ content, fileName, filePath, dirName, siblings, history }) => {
    const isPureDiagram = fileName.endsWith('.mmd') || fileName.endsWith('.mermaid');
    rawContent = content;  // store raw bytes before wrapping
    $('content-area').classList.toggle('diagram-mode', isPureDiagram);
    render(wrapIfPureMermaid(content, fileName));
    $('file-name').textContent = fileName;
    window.electronAPI.setTitle(fileName + ' — Merkdown');
    $('auto-reload-indicator').classList.add('active');
    // Sync editor textarea if edit mode is open
    if (editMode) {
      $('editor-textarea').value = content;
      setEditorModified(false);
      updateCharCount();
    }
    // Update file browser
    setActiveFile(filePath);
    if (siblings?.length) populateFileList(dirName, siblings);
    // Update recent panel
    if (history) populateRecentPanel(history);
    // Auto-switch sidebar tab: TOC for markdown, Files for diagrams
    autoSwitchTab(!isPureDiagram);
  });

  // Load history on startup so Recent tab is populated before any file is opened
  window.electronAPI.getHistory().then(history => {
    if (history) populateRecentPanel(history);
  });

  window.electronAPI.onFileChanged(({ content, filePath }) => {
    const fileName = filePath ? filePath.split('/').pop() : '';
    rawContent = content;
    render(wrapIfPureMermaid(content, fileName), true);
    setActiveFile(filePath);
  });

  window.electronAPI.onToggleSidebar(toggleSidebar);
  window.electronAPI.onToggleSource(toggleSource);
  window.electronAPI.onFind(showSearch);
}

// ─── Keyboard shortcuts (renderer-side) ─────────────────────────────────────
document.addEventListener('keydown', e => {
  const cmd = e.metaKey || e.ctrlKey;
  if (!cmd) return;
  if (e.key === 'f') { e.preventDefault(); showSearch(); }
  if (e.key === '\\') { e.preventDefault(); toggleSidebar(); }
  if (e.key === 'u') { e.preventDefault(); toggleSource(); }
  if (e.key === 'e') { e.preventDefault(); toggleEditMode(); }
  if (e.key === 's' && !e.shiftKey) { e.preventDefault(); if (editMode) saveFile(); }
  if (e.key === 's' &&  e.shiftKey) { e.preventDefault(); if (editMode) saveFileAs(); }
});
</script>
</body>
</html>
